<!DOCTYPE html>
<html>
    <head>
        <title>Bob's Adventure</title>
    </head>
    <body>
        <canvas id = "canvas" width = "640" height = "480"></canvas>
        <script>
            var game = {
                timer: null,
                finished: false,
                controls: {
                    up: false,
                    down: false,
                    left: false,
                    right: false,
                    mapping: {
                        87: "up",
                        83: "down",
                        65: "left",
                        68: "right" 
                    },
                    buttonPress: function(keyInfo) {

                    },
                    buttonRelease: function(keyInfo) {

                    },
                    connect: function(keyInfo) {

                    }
                },
                sounds: {                   //sounds property should be done
                    enabled: true,
                    jump: function() {
                        this.play("meow.wav");
                    },
                    backgroundMusic: function() {
                        this.play("background.mp3");
                    },
                    play: function(filename) {
                        if(this.enabled) {
                            new Audio("sounds/" + filename).play();
                        }
                    }
                },
                loop: function() {
                    if(this.finished) {
                        return;
                    }
                    world.tick();
                    world.draw();
                    player.tick();
                    player.draw();
                },
                start: function() {
                    this.loop();
                },
                stop: function(reason) {
                    this.finished = true;
                }
            };
            var world = {
                height: 480,
                width: 640,
                gravity: 10,
                distanceTravelled: 0,
                level: null,
                collisionMap: null,
                tickCount: 0,
                enemies:[],
                loadLevel: function() {
                    this.level = new Image();
                    this.level.src = "levelImage.png";
                },
                getPixelType: function() {},
                tick: function() {
                    this.loadLevel();
                },
                activateEnemies: function() {},
                draw: function() {
                    var drawAtX = this.distanceTravelled * -1;
                    drawAtX = drawAtX > 0 ? 0 : drawAtX;
                    ctx.drawImage(this.level, drawAtX, 0);
                },
            };
            var player = {
                character: new character(),
                tick: function() {},
                processControls: function() {},
                draw: function() {},
            };
            function character() {}
            function animation() {}
            function enemy() {}
            game.start();
        </script>

</html>
