<!DOCTYPE html>
<html>
    <head>
        <title>Bob's Adventure</title>
    </head>
    <body>
        <canvas id = "canvas" width = "640" height = "480"></canvas>
        <script type = "text/javascript">
            var canvas = document.getElementById("canvas");
            var ctx = canvas.getContext("2d");
            var game = {
                timer: null,
                finished: false,
                controls: {
                    up: false,
                    down: false,
                    left: false,
                    right: false,
                    mapping: {
                        87: "up",
                        83: "down",
                        65: "left",
                        68: "right" 
                    },
                    buttonPress: function(keyInfo) {

                    },
                    buttonRelease: function(keyInfo) {

                    },
                    connect: function(keyInfo) {
                        window.addEventListener("keydown", function(keyInfo) {
                            game.controls.buttonPress(event);
                        }, false);
                        window.addEventListener("keyup", function(keyInfo) {
                            game.controls.buttonRelease(event);
                        }, false);
                    }
                },
                sounds: {                   //sounds property should be done
                    enabled: true,
                    jump: function() {
                        this.play("meow.wav");
                    },
                    backgroundMusic: function() {
                        this.play("background.mp3");
                    },
                    play: function(filename) {
                        if(this.enabled) {
                            new Audio("sounds/" + filename).play();  //".play();" is giving the error: Uncaught (in promise) DOMException
                        } //going to try using a button perhaps? or try using promises 
                    }
                },
                loop: function() {                  //game.loop is finished
                    if(this.finished) {
                        return;
                    }
                    world.tick();
                    world.draw();
                    player.tick();
                    player.draw();
                    this.timer = setTimeout("game.loop()", 1000/60);
                },
                start: function() {             //start function done
                    this.controls.connect();
                    this.sounds.backgroundMusic();
                    this.loop();
                },
                stop: function(reason) {
                    this.finished = true;
                    window.clearTimeout(this.timer);
                }
            };
            var world = {               //world object should be done except the link for the collision map, see line 94 for reason
                height: 480,
                width: 640,
                gravity: 10,
                distanceTravelled: 0,
                level: null,
                collisionMap: null,
                tickCount: 0,
                enemies:[],
                loadLevel: function() {
                    this.level = new Image();
                    this.level.src = "/BobsAdventure/levelImage.png";
                    var collisionMapImage = new Image();
                    collisionMapImage.onload = function (loadEvent) {
                    var hiddenCanvas = document.createElement("CANVAS");
                    hiddenCanvas.setAttribute("width", this.width);
                    hiddenCanvas.setAttribute("height", this.height);
                    world.collisionMap = hiddenCanvas.getContext("2d");
                    world.collisionMap.drawImage(this, 0, 0);
                    }
                    //collisionMapImage.src = "" (needs B64 encrypted text, since its a massive block I'll wait to add it here and hope for no errors)
                },
                getFloorBelowY: function() {
                    for(var tempY = y; tempY <= world.height; tempY++) {
                        if (this.isSolidSurface(x, tempY)) {
                            return tempY;
                        }
                    }
                    return 0;
                },
                isSolidSurface: function(x, y) {
                    return this.getPixelType(x, y) == "#";
                },
                getPixelType: function() {                  //getPixelType is done
                    if (!this.collisionMap) {
                        return ".";
                    }
                    var rawData = this.collisionMap.getImageData(x, y, 1, 1).data;
                    var mask = rawData[0] + " " + rawData[1] + " " + rawData[2] + " " + rawData[3];
                    if (mask == "255 0 0 255") return "pit";
                    if (mask == "76 255 0 255") return "exit";
                    if (mask == "255 255 255 255") return ".";
                    if (mask == "0 0 0 255") return "#";
                },
                tick: function() {
                    this.loadLevel();
                },
                activateEnemies: function() {},
                draw: function() {
                    var drawAtX = this.distanceTravelled * -1;
                    drawAtX = drawAtX > 0 ? 0 : drawAtX;
                    ctx.drawImage(this.level, drawAtX, 0);
                },
            };
            var player = {
                character: new character(160, 390, 25, 25, //the ending par is on line 120, I didn't forget anything here
                new animation("graphics/cat", 5),
                new animation("graphics/cat.backwards", 5)),
                tick: function() {},
                processControls: function() {},
                draw: function() {this.character.draw(); }, //.draw() is giving an error| in this object(player), in the property(character), draw
            };
            function character(x, y, width, height, runningSprite, reverseSprite) {
                this.x = x;
                this.y = y;
                this.height = height;
                this.width = width;
                this.speed = 0;
                this.downwardForce = 0;
                this.jumpHeight = 0;
                this.runningSprite = runningSprite;
                this.runningSpriteReversed = reverseSprite;
                this.tick = function() {
                    this.applyGravity();
                    this.applyMovement();
                }
                this.applyGravity = function() {

                }
                this.applyMovement = function() {

                }
                this.bottom = function() {
                    return this.y + this.height;
                }
                this.isJumping = function() {
                    return this.downwardForce < 0;
                }
                this.isFalling = function() {
                    return this.downwardForce > 0;
                }
                this.isMoving = function() {
                    return this.speed != 0;
                }
                this.leadingEdge = function() {
                    return this.speed < 0 ? this.x : this.x + this.width;
                }
                this.trailingEdge = function() {
                    return this.speed < 0 ? this.x : this.x +  this.width;
                }
                this.standingOnAPlatform = function() {
                    return world.isSolidSurface(this.leadingEdge(), this.bottom() + 1) ||
                        world.isSolidSurface(this.trailingEdge(), this.bottom() + 1);
                }
                this.draw = function() {

                }
                this.collidesWith = function(other) {

                }
            }
            function animation() {}
            function enemy(x, y) {
                this.character = new character(x, y, 25, 25,
                    new animation("graphics/tiger", 5),
                    new animation("graphics/tiger.backwards", 5))
                this.tick = function() { /* process enemy logic */},
                this.draw = function() {this.character.draw(); } 
            }
            game.start();
        </script>

</html>
