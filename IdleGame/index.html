<html>
    <head>
        <link rel="stylesheet" type="text/css" href="org.css"/>
        <title>Clicker Game</title>
    </head>
    <body class="body">
        <p id="Credits">0 Credits</p>
        <p id="CPS">Credits per Second: 0</p>
        <script type="text/javascript"  src="oop.js"></script>
        <script type="text/javascript" src="chev.js"></script>
        <script type="text/javascript" src="main.js"></script>
        <input class="Button" id="Button" type="button" value="Click" onclick="addCredit()"/>
        <div class="Buildings">
            <h3>BUILDINGS</h3>
            <div class="b0" id="b0">
                <button class="B0" id="B0" onclick="B0.buy()">
                    <span id="B0Name">B0</span>
                    <span id="B0Cost">Cost: 20</span>
                    <span id="B0Owned">Owned: 0</span>
                </button>
            </div>
            <div class="b1" id="b1">
                <button class="B1" id="B1" onclick="B1.buy()">
                    <span id="B1Name">B1</span>
                    <span id="B1Cost">Cost: 50</span>
                    <span id="B1Owned">Owned: 0</span>
                </button>
            </div>
            <div class="b2" id="b2">
                <button class="B2" id="B2" onclick="B2.buy()">
                <span id="B2Name">B2</span>
                <span id="B2Cost">Cost: 80</span>
                <span id="B2Owned">Owned: 0</span>
                </button>
            </div>
            <div class="b3" id="b3">
                <button class="B3" id="B3" onclick="B3.buy()">
                    <span id="B3Name">B3</span>
                    <span id="B3Cost">Cost: 110</span>
                    <span id="B3Owned">Owned: 0</span>
                </button>
            </div>
            <div class="b4" id="b4">
                <button class="B4" id="B4" onclick="B4.buy()">
                    <span id="B4Name">B4</span>
                    <span id="B4Cost">Cost: 200</span>
                    <span id="B4Owned">Owned: 0</span>
                </button>
            </div>
        </div>
        <div class="upgrades" id="upgrades">
            <h3>UPGRADES</h3>
            <button class="U1" id="U1" onclick="U1.buy()" style="visibility: hidden">
                <span id="U1Name">U1</span>
                <span id="U1Cost">Cost: 100</span>
                <span id="U1Effect">Effect: B1 cps*.1</span>
            </button>
            <button class="U2" id="U2" onclick="U2.buy()" style="visibility: hidden">
                <span id="U2Name">U2</span>
                <span id="U2Cost">Cost: 150</span>
                <span id="U2Effect">Effect: x</span>
            </button>
        </div>
        <div class="chevTitle">
            <h3 id="chevTitle">ACHIEVEMENTS Unlocked 0/2:</h3>
        </div>
        <div class="chevs" id="chevs">
            <div id="S1" style="visibility: hidden">S1</div>
            <div id="S2" style="visibility: hidden">S2</div>
            <div id="C1" style="visibility: hidden">C1</div>
            <div id="C2" style="visibility: hidden">C2</div>
            <div id="C3" style="visibility: hidden">C3</div>
        </div>
    </body>
    <footer>
        <p class="VersionNum" id="VersionNum" style="position: fixed">Version: Alpha 0.9.6</p>
    </footer>
</html>
