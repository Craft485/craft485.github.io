        <p id="currency">0 Credits</p>

            <div class="b3">

            </div>
        </div>
        <div class="upgrades" id="upgrades">

            <div class="u1" id="u1">

        <input class="button" type="button" value="click" onclick="addCurrency()"/>
        <script>
            var Building = function(name, cost, owned=0, factor=1) {
                this.name = name;
                this.cost = cost;
                this.owned = owned;
                this.factor = factor;
                console.log(this.name);
                this.buy = function(count=1) {
                    
                    if (currency >= this.cost) {
                        currency -= this.cost;
                        this.owned++;
                        CPS += this.factor;
                        this.cost += (this.cost + this.factor);
                        document.getElementById("currency").innerHTML = currency + " " + "Credits";
                        console.log("bought building: " + this.name);
                    }
                }
            }
            var Upgrade = function(name, cost, PreReqB, PreReqCount, effect) {
                this.name = name;
                this.cost = cost;
                this.owned = false;
                this.PreReqB = PreReqB;
                this.PreReqCount = PreReqCount;
                this.effect = this.effect;
                this.buy = function() {
                    if(this.PreReqB=true && this.PreReqCount && this.owned != true && currency >= this.cost) {
                        currency -= this.cost;
                        this.owned = true;
                        document.getElementById("currency").innerHTML = currency + " " + "Credits";
                        this.remove();
                        console.log("removed/bought upgrade: " + this.name);
                    }
                }
                this.remove = function() {
                    var parent = document.getElementById("upgrades");
                    parent.removeChild(this.name);
                    
                }
                this.add = function() {
                    var name = this.name;
                    var dElement = document.createElement("div");
                    var textNode = document.createTextNode(name);
                    document.getElementById("upgrades").appendChild(dElement);
                }
            }

            var currency = 1000;
            var CPS = 1000; //dev numbers
            function addCurrency() {
                currency++;
                document.getElementById("currency").innerHTML = currency + " " + "Credits";
            }
            function loop() {
                currency += CPS;
                BU();
                // ChevCheck();
                document.getElementById("currency").innerHTML = currency + " " + "Credits";
                window.setTimeout("loop()", 1000);
            }
            function BU() {
                if(B1.owned > 0) {
                    document.getElementById("B1CostDisplay").innerHTML = "Cost: " + B1.cost;
                    document.getElementById("B1Owned").innerHTML = "Owned: " + B1.owned;
                }
                if(B2.owned > 0) {
                    document.getElementById("B2CostDisplay").innerHTML = "Cost: " + B2.cost;
                    document.getElementById("B2Owned").innerHTML = "Owned: " + B2.owned;
                }
                if(B3.owned > 0) {
                    document.getElementById("B3CostDisplay").innerHTML = "Cost: " + B3.cost;
                    document.getElementById("B3Owned").innerHTML = "Owned: " + B3.owned;
                }
            }
            /* building block*/
            var B1 = new Building("B1", 5, 0, 1);
            var B2 = new Building("B2", 10, 0, 2);
            var B3 = new Building("B3", 25, 0, 50);
