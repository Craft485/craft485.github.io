<!DOCTYPE html>
<html oncontextmenu="return false" lang="en">
    <head>
        <title>Dash Quiz</title>
        <link rel="stylesheet" type="text/css" href="../../style.css"/>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <!--^^jQuery^^-->
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.0/css/bootstrap.min.css" integrity="sha384-SI27wrMjH3ZZ89r4o+fGIJtnzkAnFs3E4qz9DIYioCQ5l9Rd/7UAa8DHcaL8jkWt" crossorigin="anonymous">
        <!--^^Bootstrap^^-->
        <style>
        .background {
            background-color: transparent;
        }
        .startBtn {
            margin: auto;
        }
        .option {
            width: 50%;
        }
        .answers {
            width: 50%;
        }
        .btn {
            border-style: solid;
            border-width: medium;
            border-color: black;
            bottom: 1px;
            color:white;
        }
        </style>
    </head>
    <body class="background" ><!--onkeydown="return false"-->
        <!--Banner Content-->
        <div class="banner-wrapper">
            <button class="nav-button"><a href="../../index.html"><h1><b>Home</b></h1></a></button>
            <button class="nav-button"><a href="../12-Days-of-Dashmas.html"><h1><b>12 Days of Dashmas</b></h1></a></button>
            <button class="nav-button"><a href="../cards.html"><h1><b>Cards</b></h1></a></button>
            <button class="nav-button"><a href="../video.html"><h1><b>Music Video!</b></h1></a></button>
            <button class="nav-button"><a href="../credits.html"><h1><b>Credits</b></h1></a></button>
            <button class="nav-button"><a href="../discord.html"><h1><b>Dashmas Discord</b></h1></a></button>
            <button class="nav-button"><a href="index.html"><h1><b>Dash Quiz</b></h1></a></button>
        </div>
        <!--That's a lot a buttons-->
        <script defer src="main.js"></script>
        <!--<script defer src="OOP.js"></script>-->
        <button id="startBtn" class="startBtn" onclick="newGame()">Start New Game</button>
        <div class="game" id="game">
            <div style="width: auto; float: right; visibility: hidden;"  id="highScoreDisplay">
                <span style="color: white;">Your best score: </span><span id="highScore" style="color: white;"></span>
            </div>
            <p style="color: white;">Score: <span id="scoreDisplay">0</span></p>
            <div id="questionDisplay" style="color: white;">
                <!--Show question-->
            </div>
            <!--Answer Box Content-->
            <div class="answers">
                <!--List possible answers A-D-->
                <div class="option">
                    <button class="btn" onclick="isCheck(document.getElementById('answerA').innerHTML)">
                        <span id="answerA"></span>
                    </button>
                </div>
                <div class="option">
                    <button class="btn" onclick="isCheck(document.getElementById('answerB').innerHTML)">
                        <span id="answerB"></span>
                    </button>
                </div>
                <div class="option">
                    <button class="btn" onclick="isCheck(document.getElementById('answerC').innerHTML)">
                        <span id="answerC"></span>
                    </button>
                </div>
                <div class="option">
                    <button class="btn" onclick="isCheck(document.getElementById('answerD').innerHTML)">
                        <span id="answerD"></span>
                    </button>
                </div>
            </div>
            <!--End of Answer Box Content-->
            <script>
            $(document).keydown((e)=>{
                if(e.which === 123){
                    return false;
                }
            });
            </script>
        </div>
    </body>
</html>
