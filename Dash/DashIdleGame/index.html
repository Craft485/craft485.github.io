<!DOCTYPE html>
<html lang="en" oncontextmenu="return false">
    <head>
        <title>Idle Dash</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.0/css/bootstrap.min.css" integrity="sha384-SI27wrMjH3ZZ89r4o+fGIJtnzkAnFs3E4qz9DIYioCQ5l9Rd/7UAa8DHcaL8jkWt" crossorigin="anonymous">
        <!--^^Bootstrap^^-->
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="background">
        
        <script defer src="buildings.js"></script>
        <script defer src="acheivments.js"></script>
        <script defer src="upgrades.js"></script>
        <script defer src="main.js"></script>

        <div id="currencyDisplay">
            <p>You have <span id="dashPointsDisplay">0</span> Dash Points</p>
            <p><span id="DPPSDisplay">0</span> Dash Points per Second</p>
            <button class="btn" id="earnDashPointsBtn" onclick="addDashPoint()">Earn Dash Points</button>
        </div>
        
        <div class="buildingsDisplay">
            <!--Building Display Content-->
            <h1 class="contentHeader" style="border-style: solid; border-color: black;">Buildings</h1>
            <div class="building">
                <span class="buildingName">Name: <strong>Send a Message</strong></span><br/>
                <button class="buildingCost" onclick="SendAMessage.buy()">Cost: <span id="SAMCost">15</span> Dash Points</button><br/>
                <span>Owned: <span id="SAMAmountOwned">0</span></span><br/>
                <span>Dash Points per Second: <br/><span class="buildingDPPS" id="SAMDPPS"></span></span><br/>
            </div>

            <div class="building">
                <span class="buildingName">Name: <strong>Read Rulebook</strong></span><br/>
                <button class="buildingCost" onclick="ReadRulebook.buy()">Cost: <span id="RRCost">50</span> Dash Points</button><br/>
                <span>Owned: <span id="RRAmountOwned">0</span></span><br/>
                <span>Dash Points per Second: <br/><span class="buildingDPPS" id="RRDPPS"></span></span><br/>
            </div>
        </div>

        <div class="upgradeDisplay" id="upgradeDisplay">
            <!--Upgrade Display Content-->
            <h1 class="contentHeader" style="text-align: center;">Upgrades</h1>
        </div>
        <!--Acheivment content-->
        <iframe class="iFrame" src="acheivment.html" id="achievmentIFrame"></iframe>
    </body>
</html>
