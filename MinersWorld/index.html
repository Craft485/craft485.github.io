<!DOCTYPE html>
<html>
    <head>
        <title>Minersworld</title>
        <style></style>
    </head>
    <body class="body" id="body">
        <input id="buttonStart" type="button" value="start" onclick="start()"/>
        <canvas id="canvas" width="1300" height="600"></canvas>
        <script type="text/Javascript">
            function start() {
                var e = document.getElementById("buttonStart")
                body.removeChild(e)
                loop()
            }
            function floor(x, y, height) {
                this.x = x
                this.y = y
                this.width = 50
                this.height = height
            }
            function setDiff() {
                var diff1 = document.createElement("button")
                diff1.innerHTML = "Mode: easy(no monsters)"
                diff1.onclick = difficulty = 1
                document.body.appendChild(diff1)
            }
            var canvas = document.getElementById("canvas")
            var ctx = canvas.getContext("2d")
            var isNight = false
            var isDay = true
            var difficulty
            var world = {
                height: 600,
                width: 1300,
                newTile: [
                    new floor(0, 0, 50)
                ],
                draw: function() {
                    ctx.fillStyle = "skyblue"
                    ctx.fillRect(0, 0, this.width, this.height)
                }
            }
            var player = {
                health: 100,
                draw: function() {

                }
            }
            function attemptEnemySpawn() {
                zombie.checkSpawn(difficulty)
            }
            function loop() {
                world.draw()
                player.draw()
                if(isNight == true) {
                    attemptEnemySpawn()
                }
                window.setTimeout("loop()", 1000)
            }
        </script>
        <script type="text/Javascript" src="oop.js"></script>
    </body>
    <footer>
        <a href = "index.html">back to main page</a>
    </footer>
</html>
